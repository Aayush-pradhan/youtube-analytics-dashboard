<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Analytics Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-5">

<h1 class="title">YouTube Analytics Dashboard</h1>

<form method="POST" class="search-box">
<input type="text" name="url" placeholder="Paste YouTube video or channel URL" required>
<button type="submit">Analyze</button>
</form>

{% if title %}

<h2 class="video-title">{{ title }}</h2>

<img src="{{ thumbnail }}" class="thumbnail">

<div class="metrics">

<div class="card views">
<h3>Views</h3>
<p>{{ views }}</p>
</div>

<div class="card likes">
<h3>Likes</h3>
<p>{{ likes }}</p>
</div>

<div class="card comments">
<h3>Comments</h3>
<p>{{ comments }}</p>
</div>

<div class="card engagement">
<h3>Engagement</h3>
<p>{{ engagement_rate }} %</p>
</div>

</div>

<h3 class="chart-title">Engagement Analysis</h3>

<img src="{{ url_for('static', filename='chart.png') }}" class="chart">

{% endif %}

</div>

</body>
</html>
